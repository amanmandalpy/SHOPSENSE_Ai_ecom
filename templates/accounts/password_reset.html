{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-center mb-6">Reset Password</h2>
    <p class="text-sm text-gray-600 mb-6 text-center">Enter your email address and we'll send you a link to reset your password.</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                {{ field }}
            </div>
        {% endfor %}
        <button type="submit" class="w-full btn-primary py-3">Send Reset Link</button>
    </form>
</div>
<script>document.querySelectorAll('input').forEach(e => {if(e.type !== 'hidden') e.classList.add('input-field');});</script>
{% endblock %}
