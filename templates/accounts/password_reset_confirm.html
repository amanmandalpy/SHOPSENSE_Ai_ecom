{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-center mb-6">Set New Password</h2>
    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit" class="w-full btn-primary py-3">Update Password</button>
        </form>
    {% else %}
        <p class="text-red-500 text-center">The password reset link was invalid, possibly because it has already been used.</p>
        <div class="text-center mt-6">
            <a href="{% url 'password_reset' %}" class="btn-primary">Request a new password reset</a>
        </div>
    {% endif %}
</div>
<script>document.querySelectorAll('input').forEach(e => {if(e.type !== 'hidden') e.classList.add('input-field');});</script>
{% endblock %}
