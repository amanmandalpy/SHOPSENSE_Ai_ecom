{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-center mb-6">Change Password</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full btn-primary py-3">Change Password</button>
    </form>
</div>
<script>document.querySelectorAll('input').forEach(e => {if(e.type !== 'hidden') e.classList.add('input-field');});</script>
{% endblock %}
