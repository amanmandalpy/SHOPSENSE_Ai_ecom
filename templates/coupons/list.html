{% extends 'base.html' %}
{% block title %}All Coupons{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto py-10 px-4">
    <h1 class="text-3xl font-bold mb-8">Available Coupons</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for coupon in coupons %}
            <div class="bg-white border rounded shadow p-6">
                <div class="text-xs uppercase text-gray-500 font-bold mb-2">{{ coupon.store.name }}</div>
                <h3 class="text-xl font-black text-green-700 mb-1">{{ coupon.name }}</h3>
                <p class="text-sm text-gray-600 mb-4">{{ coupon.description }}</p>
                
                <div class="bg-gray-100 border border-dashed border-gray-400 p-2 text-center rounded">
                    <span class="font-mono text-lg font-bold">{{ coupon.code }}</span>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
