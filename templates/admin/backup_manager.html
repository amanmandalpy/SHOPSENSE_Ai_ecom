{% extends "admin/base_site.html" %}

{% block content %}
<div class="tw-wrapper">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8 mt-2">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 m-0" style="background:transparent!important; color:#1f2937!important;">Database Backups</h2>
        
        <form method="post" action="{% url 'backup_manager' %}" class="mb-8">
            {% csrf_token %}
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition shadow-sm border-0 cursor-pointer">
                <i class="fa-solid fa-download mr-2"></i> Create New Backup
            </button>
        </form>
        
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-gray-200">
                    <th class="py-3 px-4 text-sm font-semibold text-gray-600 bg-gray-50">Filename</th>
                    <th class="py-3 px-4 text-sm font-semibold text-gray-600 bg-gray-50">Size (Bytes)</th>
                    <th class="py-3 px-4 text-sm font-semibold text-gray-600 bg-gray-50">Created At</th>
                </tr>
            </thead>
            <tbody>
                {% for backup in backups %}
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                    <td class="py-3 px-4 text-sm font-medium text-gray-900">{{ backup.name }}</td>
                    <td class="py-3 px-4 text-sm text-gray-600">{{ backup.size }}</td>
                    <td class="py-3 px-4 text-sm text-gray-600">{{ backup.date|date:"F j, Y, g:i a" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="py-8 text-center text-gray-500">No backups found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
