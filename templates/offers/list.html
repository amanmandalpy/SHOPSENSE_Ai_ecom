{% extends 'base.html' %}
{% block title %}Bank Offers{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto py-10 px-4">
    <h1 class="text-3xl font-bold mb-8">Bank & Cashback Offers</h1>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for offer in offers %}
            <div class="bg-blue-50 border border-blue-200 rounded shadow p-6">
                <div class="text-xs uppercase text-blue-600 font-bold mb-2">{{ offer.bank_name }}</div>
                <h3 class="text-xl font-black text-gray-900 mb-1">{{ offer.name }}</h3>
                <p class="text-sm text-gray-600 mb-4">Valid until {{ offer.valid_until|date:"M d, Y" }}</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
