upstream shopsense_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name shopsense.ai www.shopsense.ai;

    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shopsense.ai www.shopsense.ai;

    ssl_certificate /etc/letsencrypt/live/shopsense.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shopsense.ai/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://shopsense_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /var/www/shopsense/static/;
    }

    location /media/ {
        alias /var/www/shopsense/media/;
    }
}
